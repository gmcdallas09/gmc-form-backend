services:
  - type: web
    name: gmc-form-backend
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: TO_EMAIL
        value: gmcdallas09@gmail.com
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_SECURE
        value: "true"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
